name: Docker Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read version
        id: version
        run: |
          VERSION="$(awk -F'\"' '/^version *=/ {print $2}' pyproject.toml)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        env:
          GIT_USER_NAME: "mizu"
          GIT_USER_EMAIL: "mizu.copo@gmail.com"
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"

      - name: Check if tag exists
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: mizucopo
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            mizucopo/stockvalue-exporter:latest
            mizucopo/stockvalue-exporter:${{ steps.version.outputs.version }}

      - name: Create and push git tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes "## Docker Image

          Pull the Docker image:

          \`\`\`bash
          docker pull mizucopo/stockvalue-exporter:${{ steps.version.outputs.version }}
          \`\`\`

          Or use the latest tag:

          \`\`\`bash
          docker pull mizucopo/stockvalue-exporter:latest
          \`\`\`

          ## Links:
          - [Docker Hub](https://hub.docker.com/r/mizucopo/stockvalue-exporter)
          - [Source Code](${{ github.server_url }}/${{ github.repository }}/tree/${{ steps.version.outputs.tag }})
          "
