name: PR Quality Checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run pytest
        id: pytest
        continue-on-error: true
        timeout-minutes: 10
        run: uv run pytest --tb=short -v

      - name: Run mypy
        id: mypy
        continue-on-error: true
        run: uv run mypy

      - name: Run ruff format check
        id: ruff-format
        continue-on-error: true
        run: uv run ruff format --check .

      - name: Run ruff check
        id: ruff-check
        continue-on-error: true
        run: uv run ruff check .

      - name: Verify container runtime
        id: container-runtime
        continue-on-error: true
        timeout-minutes: 10
        run: |
          IMAGE="stockvalue-exporter:pr-quality-check"
          CONTAINER="stockvalue-exporter-pr-quality-check"

          trap 'docker rm -f "$CONTAINER" >/dev/null 2>&1 || true' EXIT

          docker build --tag "$IMAGE" .
          docker run --rm --entrypoint sh "$IMAGE" -c '
            test "$(id -u)" -eq 10001
            test "$(id -g)" -eq 10001
            test "$HOME" = /home/appuser
            test "$XDG_CACHE_HOME" = /home/appuser/.cache
            test -w "$XDG_CACHE_HOME"
            test ! -w /app
            touch "$XDG_CACHE_HOME/.write-test"
          '

          docker run --detach --name "$CONTAINER" \
            --publish 127.0.0.1:19100:9100 "$IMAGE"
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:19100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$CONTAINER"
          exit 1

      - name: Build quality check summary
        id: quality-report
        if: ${{ !cancelled() }}
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          MYPY_OUTCOME: ${{ steps.mypy.outcome }}
          RUFF_FORMAT_OUTCOME: ${{ steps.ruff-format.outcome }}
          RUFF_CHECK_OUTCOME: ${{ steps.ruff-check.outcome }}
          CONTAINER_RUNTIME_OUTCOME: ${{ steps.container-runtime.outcome }}
        run: |
          format_result() {
            case "$1" in
              success) printf '✅ 成功' ;;
              failure) printf '❌ 失敗' ;;
              skipped) printf '⏭️ スキップ' ;;
              *) printf '❓ %s' "${1:-unknown}" ;;
            esac
          }

          cat > quality_report.md <<EOF
          ## Quality Checks Result

          | Item | Result |
          |-------------|------|
          | pytest | $(format_result "$PYTEST_OUTCOME") |
          | mypy | $(format_result "$MYPY_OUTCOME") |
          | ruff format | $(format_result "$RUFF_FORMAT_OUTCOME") |
          | ruff check | $(format_result "$RUFF_CHECK_OUTCOME") |
          | container runtime | $(format_result "$CONTAINER_RUNTIME_OUTCOME") |
          EOF

          cat quality_report.md >> "$GITHUB_STEP_SUMMARY"

          HAS_FAILURE=false
          for outcome in \
            "$PYTEST_OUTCOME" \
            "$MYPY_OUTCOME" \
            "$RUFF_FORMAT_OUTCOME" \
            "$RUFF_CHECK_OUTCOME" \
            "$CONTAINER_RUNTIME_OUTCOME"; do
            if [ "$outcome" != "success" ]; then
              HAS_FAILURE=true
            fi
          done
          echo "has-failure=$HAS_FAILURE" >> "$GITHUB_OUTPUT"

      - name: Enforce quality gate result
        if: ${{ !cancelled() && steps.quality-report.outputs.has-failure == 'true' }}
        run: |
          echo "::error::One or more quality checks failed or were skipped."
          exit 1
